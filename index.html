<!DOCTYPE html>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: #0a0f1a; color: #f8fafc; font-family: 'Urbanist', system-ui, sans-serif; overflow: hidden; }
  #app { height: 100vh; overflow: hidden; position: relative; }
  button { font-family: 'Urbanist', system-ui, sans-serif; cursor: pointer; border: none; background: none; }
  input, select, textarea { font-family: 'Urbanist', system-ui, sans-serif; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); }

  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; overflow: hidden; background: #0a0f1a; transition: opacity 0.25s, transform 0.25s; }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(12px); }

  /* Splash */
  #splash { align-items: center; justify-content: center; gap: 16px; }
  .splash-logo { animation: pulseAnim 2s ease-in-out infinite; }
  @keyframes pulseAnim { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  .splash-title { font-size: 48px; font-weight: 900; letter-spacing: -3px; color: #f8fafc; }
  .splash-bar { height: 3px; width: 60px; background: #f59e0b; border-radius: 2px; }
  .splash-sub { font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: #475569; }
  .spinner { width: 24px; height: 24px; border: 2px solid #1e293b; border-top-color: #f59e0b; border-radius: 50%; animation: spin 0.7s linear infinite; margin-top: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sync-badge { font-size: 9px; letter-spacing: 2px; color: #22c55e; text-transform: uppercase; margin-top: 4px; }

  /* Login */
  #login { align-items: center; justify-content: center; gap: 12px; padding: 20px; }
  .login-logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 20px; }
  .login-title { font-size: 36px; font-weight: 900; letter-spacing: -2px; }
  .login-bar { height: 2px; width: 40px; background: #f59e0b; border-radius: 2px; }
  .pin-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #64748b; }
  .pin-dots { display: flex; gap: 14px; margin: 8px 0 4px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #334155; transition: all 0.15s; }
  .pin-dot.filled { background: #f59e0b; border-color: #f59e0b; }
  .pin-error { color: #ef4444; font-size: 12px; font-weight: 600; min-height: 18px; }
  .pin-grid { display: grid; grid-template-columns: repeat(3,72px); gap: 10px; margin-top: 8px; }
  .pin-btn { width: 72px; height: 56px; border-radius: 14px; background: #111827; color: #f8fafc; font-size: 22px; font-weight: 700; border: 1px solid #1e293b; transition: all 0.1s; }
  .pin-btn:active { background: #f59e0b; color: #0a0f1a; }
  .worker-entry-btn { margin-top: 24px; padding: 14px 28px; background: #1e293b; border-radius: 12px; color: #94a3b8; font-size: 14px; font-weight: 600; }

  /* Worker screen */
  .worker-header { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #1e293b; flex-shrink: 0; }
  .back-btn { color: #94a3b8; font-size: 22px; padding: 4px 8px; }
  .site-badge { background: #f59e0b22; color: #f59e0b; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 6px; margin-left: auto; }
  .worker-body { flex: 1; overflow-y: auto; padding: 16px; }
  .worker-list { display: flex; flex-direction: column; gap: 8px; }
  .worker-card { background: #111827; border: 1px solid #1e293b; border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 12px; transition: all 0.15s; }
  .worker-card:active { background: #1e293b; }
  .worker-avatar { width: 44px; height: 44px; border-radius: 12px; background: #1e293b; display: grid; place-items: center; font-size: 18px; font-weight: 800; color: #f59e0b; flex-shrink: 0; }

  /* Content */
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
  .pane-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }

  .btn-sm:hover { background: #fbbf24; }

  .card-title { font-size: 13px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
  .form-group { margin-bottom: 12px; }
  .form-label { font-size: 12px; font-weight: 600; color: #94a3b8; margin-bottom: 4px; display: block; }
  .form-input { width: 100%; padding: 10px 14px; background: #0a0f1a; border: 1px solid #1e293b; border-radius: 10px; color: #f8fafc; font-size: 14px; }
  .form-input:focus { outline: none; border-color: #f59e0b; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: #111827; border: 1px solid #1e293b; border-radius: 14px; padding: 16px; }
  .stat-val { font-size: 28px; font-weight: 900; color: #f8fafc; }

  .th { padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 1px; background: #0f172a; border-bottom: 1px solid #1e293b; }

  .qr-canvas { background: #fff; padding: 20px; border-radius: 16px; }
  .qr-link { font-size: 11px; color: #64748b; word-break: break-all; text-align: center; max-width: 320px; font-family: 'JetBrains Mono', monospace; }
  .chip { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; }

  .chip-red { background: #ef444422; color: #ef4444; }
  .chip-amber { background: #f59e0b22; color: #f59e0b; }
  .chip-gray { background: #64748b22; color: #64748b; }
  .empty-state { text-align: center; padding: 40px 20px; color: #475569; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .site-chip { display: inline-block; padding: 2px 8px; background: #1e293b; border-radius: 6px; font-size: 11px; color: #94a3b8; margin: 2px; cursor: pointer; }
  .site-chip.selected { background: #f59e0b33; color: #f59e0b; border: 1px solid #f59e0b55; }
  .date-nav { display: flex; align-items: center; gap: 12px; }
  .date-nav button { padding: 6px 12px; background: #1e293b; border-radius: 8px; color: #94a3b8; font-size: 18px; font-weight: 700; }

  /* Mobile */
  .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a; border-top: 1px solid #1e293b; z-index: 100; padding: 8px 0 env(safe-area-inset-bottom, 8px); }
  .mob-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px; color: #64748b; font-size: 10px; font-weight: 600; letter-spacing: 0.3px; cursor: pointer; }
  .mob-nav-item.active { color: #f59e0b; }
  .mob-nav-icon { font-size: 20px; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main-pane { margin-left: 0; padding: 16px; padding-bottom: 80px; }
    .mobile-nav { display: flex; }
    .stat-grid { grid-template-columns: repeat(2,1fr); }
    .form-row { grid-template-columns: 1fr; }
  }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.2s ease; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #22c55e; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 999; display: none; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
  @media (max-width: 768px) { .toast { left: 16px; right: 16px; bottom: 80px; text-align: center; } }
</style>
</head>

<script>
// ═══════════════════════════════════════════
// FIREBASE INIT
// ═══════════════════════════════════════════
firebase.initializeApp({
  apiKey: "AIzaSyAUDiZ0OBNT-ifv3tDRaBdX1Aai5prCqu8",
  authDomain: "klok-c4ea8.firebaseapp.com",
  projectId: "klok-c4ea8",
  storageBucket: "klok-c4ea8.firebasestorage.app",
  messagingSenderId: "898431597595",
  appId: "1:898431597595:web:d72dc4c2c0217301d94cbe"
});
const db = firebase.firestore();

// ═══════════════════════════════════════════
// FIRESTORE DB WRAPPER (replaces localStorage)
// ═══════════════════════════════════════════
const DB = {
  cache: {},
  listeners: {},

  async get(key) {
    if (this.cache[key] !== undefined) return this.cache[key];
    try {
      const doc = await db.collection('klok').doc(key).get();
      const val = doc.exists ? doc.data().value : null;
      this.cache[key] = val;
      return val;
    } catch(e) { console.error('DB.get error:', e); return null; }
  },

  async set(key, val) {
    this.cache[key] = val;
    try {
      await db.collection('klok').doc(key).set({ value: val, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
      return true;
    } catch(e) { console.error('DB.set error:', e); return false; }
  },

  async del(key) {
    delete this.cache[key];
    try { await db.collection('klok').doc(key).delete(); } catch(e) { console.error('DB.del error:', e); }
  },

  // Real-time listener for a key
  listen(key, callback) {
    if (this.listeners[key]) this.listeners[key](); // unsub old
    this.listeners[key] = db.collection('klok').doc(key).onSnapshot(doc => {
      if (doc.exists) {
        this.cache[key] = doc.data().value;
        callback(doc.data().value);
      }
    });
  },

  unlisten(key) {
    if (this.listeners[key]) { this.listeners[key](); delete this.listeners[key]; }
  }
};

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
const genId = () => Math.random().toString(36).slice(2, 10);
const fmt = {
  date: d => new Date(d).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' }),
  time: d => new Date(d).toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' }),
  iso: d => new Date(d).toISOString().slice(0,10),
  hours: ms => { if(!ms||ms<0) return '—'; const h=Math.floor(ms/3600000); const m=Math.floor((ms%3600000)/60000); return `${h}h ${m}m`; },
  today: () => fmt.iso(new Date()),
  weekStart: () => { const d=new Date(); d.setDate(d.getDate()-d.getDay()+1); return fmt.iso(d); }
};

const QR_BASE_URL = 'https://andreivaculea-blip.github.io/klok-app';

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}
function toast(msg, ms=2000) {
  const t = document.getElementById('toast'); t.textContent = '✓ ' + msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', ms);
}

// ═══════════════════════════════════════════
// PIN LOGIN
// ═══════════════════════════════════════════
let pin = '';
async function addPin(n) {
  if (pin.length >= 4) return;
  pin += n;
  updatePinDots();
  if (pin.length === 4) {
    const managers = await DB.get('managers');
    if (!managers || managers.length === 0) {
      // First time — create manager with this PIN
      await DB.set('managers', [{ id: genId(), name: 'Manager', pin: pin }]);
      currentManager = { name: 'Manager', pin: pin };
      showScreen('manager');
      initManager();
      return;
    }
    const mgr = managers.find(m => m.pin === pin);
    if (mgr) {
      currentManager = mgr;
      showScreen('manager');
      initManager();
    } else {
      document.getElementById('pinError').textContent = 'Wrong PIN';
      pin = '';
      setTimeout(() => { updatePinDots(); document.getElementById('pinError').textContent = ''; }, 800);
    }
  }
}
function removePin() { pin = pin.slice(0,-1); updatePinDots(); }
function updatePinDots() {
  document.querySelectorAll('#pinDots .pin-dot').forEach((d,i) => d.classList.toggle('filled', i < pin.length));
}

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
let currentManager = null;
let currentSiteId = null;
let currentTab = 'dashboard';
let deepLinkSiteId = null;

async function init() {
  // Check for deep link (worker QR)
  const params = new URLSearchParams(window.location.search);
  if (params.get('site')) {
    deepLinkSiteId = params.get('site');
    showScreen('worker');
    initWorkerView();
    return;
  }

  // Check if any managers exist
  const managers = await DB.get('managers');
  setTimeout(() => showScreen('login'), 1200);
}

init();

// ═══════════════════════════════════════════
// WORKER VIEW (for QR code scanned workers)
// ═══════════════════════════════════════════
let workerStep = 'list'; // list -> confirm -> success
let selectedWorker = null;

async function initWorkerView() {
  workerStep = 'list';
  selectedWorker = null;
  const sites = await DB.get('sites') || [];
  const site = sites.find(s => s.id === deepLinkSiteId);
  const badge = document.getElementById('workerSiteBadge');
  if (site) { badge.textContent = site.name; badge.style.display = ''; }
  else { badge.textContent = 'Unknown Site'; badge.style.display = ''; }
  renderWorkerList();

  // Listen for real-time updates
  DB.listen('workers', () => { if (workerStep === 'list') renderWorkerList(); });
  DB.listen('attendance', () => { if (workerStep === 'list') renderWorkerList(); });
}

async function renderWorkerList() {
  const body = document.getElementById('workerBody');
  const workers = (await DB.get('workers') || []).filter(w => w.active !== false && (!w.siteIds || w.siteIds.length === 0 || w.siteIds.includes(deepLinkSiteId)));
  const attendance = await DB.get('attendance') || [];
  const today = fmt.today();

  if (workers.length === 0) {
    body.innerHTML = '<div class="empty-state"><div class="empty-icon">👷</div><p>No workers assigned to this site</p></div>';
    return;
  }

  const html = workers.map(w => {
    const todayRecs = attendance.filter(a => a.workerId === w.id && a.date === today && a.siteId === deepLinkSiteId);
    const lastRec = todayRecs[todayRecs.length - 1];
    const isSignedIn = lastRec && lastRec.type === 'in';
    return `<div class="worker-card" onclick="selectWorker('${w.id}')">
      <div class="worker-avatar">${w.name.charAt(0)}</div>
      <div class="worker-info">
        <div class="worker-name">${w.name}</div>
        <div class="worker-trade">${w.trade || 'General'}</div>
      </div>
      <div class="worker-status ${isSignedIn?'in':'out'}">${isSignedIn?'ON SITE':'OFF SITE'}</div>
    </div>`;
  }).join('');

  body.innerHTML = `<div class="worker-list fade-up">${html}</div>`;
}

async function selectWorker(id) {
  const workers = await DB.get('workers') || [];
  selectedWorker = workers.find(w => w.id === id);
  if (!selectedWorker) return;
  workerStep = 'confirm';
  const attendance = await DB.get('attendance') || [];
  const today = fmt.today();
  const todayRecs = attendance.filter(a => a.workerId === id && a.date === today && a.siteId === deepLinkSiteId);
  const lastRec = todayRecs[todayRecs.length - 1];
  const isSignedIn = lastRec && lastRec.type === 'in';
  const now = new Date();

  const body = document.getElementById('workerBody');
  body.innerHTML = `<div class="confirm-box fade-up">
    <div class="worker-avatar" style="width:64px;height:64px;font-size:28px;margin:0 auto">${selectedWorker.name.charAt(0)}</div>
    <div class="confirm-name">${selectedWorker.name}</div>
    <div class="confirm-action">${isSignedIn ? 'Sign Out' : 'Sign In'}</div>
    <div class="confirm-time">${fmt.time(now)}</div>
    <button class="btn-confirm ${isSignedIn?'btn-sign-out':'btn-sign-in'}" onclick="confirmAttendance('${isSignedIn?'out':'in'}')">${isSignedIn ? '⏹ SIGN OUT' : '▶ SIGN IN'}</button>
    <button class="btn-confirm btn-cancel" onclick="workerBack()">Cancel</button>
  </div>`;
}

async function confirmAttendance(type) {
  const attendance = await DB.get('attendance') || [];
  attendance.push({
    id: genId(),
    workerId: selectedWorker.id,
    workerName: selectedWorker.name,
    siteId: deepLinkSiteId,
    date: fmt.today(),
    time: new Date().toISOString(),
    type: type
  });
  await DB.set('attendance', attendance);

  workerStep = 'success';
  const body = document.getElementById('workerBody');
  body.innerHTML = `<div class="success-screen fade-up">
    <div class="success-icon">${type==='in' ? '✅' : '👋'}</div>
    <div class="success-text">${selectedWorker.name}</div>
    <div class="success-detail">${type==='in' ? 'Signed In' : 'Signed Out'} at ${fmt.time(new Date())}</div>
  </div>`;
  setTimeout(() => { workerStep = 'list'; renderWorkerList(); }, 2500);
}

function workerBack() {
  if (workerStep === 'confirm' || workerStep === 'success') { workerStep = 'list'; renderWorkerList(); }
  else { showScreen('login'); pin = ''; updatePinDots(); }
}

// ═══════════════════════════════════════════
// MANAGER DASHBOARD
// ═══════════════════════════════════════════
const TABS = [
  { id: 'dashboard', icon: '📊', label: 'Dashboard' },
  { id: 'attendance', icon: '📋', label: 'Attendance' },
  { id: 'workers', icon: '👷', label: 'Workers' },
  { id: 'sites', icon: '🏗', label: 'Sites' },
  { id: 'reports', icon: '📈', label: 'Reports' },
];

async function initManager() {
  currentTab = 'dashboard';
  const sites = await DB.get('sites') || [];
  if (sites.length > 0 && !currentSiteId) currentSiteId = sites[0].id;
  renderNav();
  renderSiteSelect();
  renderTab(currentTab);

  // Real-time listeners
  DB.listen('sites', () => { renderSiteSelect(); renderTab(currentTab); });
  DB.listen('workers', () => renderTab(currentTab));
  DB.listen('attendance', () => renderTab(currentTab));
}

function renderNav() {
  const nav = document.getElementById('navList');
  nav.innerHTML = TABS.map(t => `<div class="nav-item ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')">
    <span>${t.icon}</span> ${t.label}
  </div>`).join('');

  const mobileNav = document.getElementById('mobileNav');
  mobileNav.innerHTML = TABS.map(t => `<div class="mob-nav-item ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')">
    <span class="mob-nav-icon">${t.icon}</span>${t.label}
  </div>`).join('');

  document.getElementById('sidebarUser').textContent = '👤 ' + (currentManager?.name || 'Manager');
}

async function renderSiteSelect() {
  const sel = document.getElementById('siteSelect');
  const sites = await DB.get('sites') || [];
  sel.innerHTML = '<option value="all">All Sites</option>' + sites.map(s => `<option value="${s.id}" ${s.id===currentSiteId?'selected':''}>${s.name}</option>`).join('');
}

function onSiteChange(val) { currentSiteId = val === 'all' ? null : val; renderTab(currentTab); }
function switchTab(id) { currentTab = id; renderNav(); renderTab(id); }

async function renderTab(tab) {
  const pane = document.getElementById('mainPane');
  pane.scrollTop = 0;
  switch(tab) {
    case 'dashboard': return renderDashboard(pane);
    case 'attendance': return renderAttendance(pane);
    case 'workers': return renderWorkers(pane);
    case 'sites': return renderSites(pane);
    case 'reports': return renderReports(pane);
  }
}

// ── Dashboard ──
async function renderDashboard(pane) {
  const sites = await DB.get('sites') || [];
  const workers = await DB.get('workers') || [];
  const attendance = await DB.get('attendance') || [];
  const today = fmt.today();
  const todayRecs = attendance.filter(a => a.date === today && (!currentSiteId || a.siteId === currentSiteId));
  const activeWorkerIds = new Set();
  todayRecs.forEach(a => {
    if (a.type === 'in') activeWorkerIds.add(a.workerId);
    else activeWorkerIds.delete(a.workerId);
  });
  const totalHours = todayRecs.reduce((sum, a, i, arr) => {
    if (a.type === 'out') {
      const inRec = [...arr].reverse().find(r => r.workerId === a.workerId && r.type === 'in' && new Date(r.time) < new Date(a.time));
      if (inRec) sum += new Date(a.time) - new Date(inRec.time);
    }
    return sum;
  }, 0);

  pane.innerHTML = `<div class="fade-up">
    <div class="top-bar"><div class="pane-title">Dashboard</div><div style="font-size:13px;color:#64748b">${fmt.date(new Date())}</div></div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-val">${activeWorkerIds.size}</div><div class="stat-label">On Site Now</div></div>
      <div class="stat-card"><div class="stat-val">${workers.filter(w=>w.active!==false).length}</div><div class="stat-label">Total Workers</div></div>
      <div class="stat-card"><div class="stat-val">${sites.length}</div><div class="stat-label">Sites</div></div>
      <div class="stat-card"><div class="stat-val">${fmt.hours(totalHours)}</div><div class="stat-label">Hours Today</div></div>
    </div>
    ${activeWorkerIds.size > 0 ? `<div class="card"><div class="card-title">Currently On Site</div>
      ${[...activeWorkerIds].map(id => {
        const w = workers.find(x => x.id === id);
        if (!w) return '';
        const inRec = [...todayRecs].reverse().find(a => a.workerId === id && a.type === 'in');
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e293b11">
          <div class="worker-avatar" style="width:36px;height:36px;font-size:14px">${w.name.charAt(0)}</div>
          <div><div style="font-weight:700;font-size:14px">${w.name}</div><div style="font-size:11px;color:#64748b">In since ${inRec ? fmt.time(inRec.time) : '—'}</div></div>
          <div class="chip chip-green" style="margin-left:auto">ON SITE</div>
        </div>`;
      }).join('')}
    </div>` : '<div class="card"><div class="empty-state"><div class="empty-icon">🏗</div><p>No workers on site today</p></div></div>'}
  </div>`;
}

// ── Attendance ──
let attendanceDate = fmt.today();
async function renderAttendance(pane) {
  const attendance = await DB.get('attendance') || [];
  const workers = await DB.get('workers') || [];
  const dayRecs = attendance.filter(a => a.date === attendanceDate && (!currentSiteId || a.siteId === currentSiteId))
    .sort((a,b) => new Date(b.time) - new Date(a.time));

  pane.innerHTML = `<div class="fade-up">
    <div class="top-bar">
      <div class="pane-title">Attendance</div>
      <div class="date-nav">
        <button onclick="shiftAttDate(-1)">‹</button>
        <input type="date" class="form-input" style="width:auto;text-align:center" value="${attendanceDate}" onchange="attendanceDate=this.value;renderTab('attendance')">
        <button onclick="shiftAttDate(1)">›</button>
      </div>
    </div>
    ${dayRecs.length === 0 ? '<div class="card"><div class="empty-state"><div class="empty-icon">📋</div><p>No records for this date</p></div></div>' :
    `<div class="table-wrap"><table>
      <thead><tr><th class="th">Time</th><th class="th">Worker</th><th class="th">Action</th><th class="th">Site</th></tr></thead>
      <tbody>${dayRecs.map(a => {
        const w = workers.find(x => x.id === a.workerId);
        return `<tr><td class="td" style="font-family:'JetBrains Mono',monospace;font-size:13px">${fmt.time(a.time)}</td>
          <td class="td" style="font-weight:600">${w ? w.name : a.workerName || '?'}</td>
          <td class="td"><span class="chip ${a.type==='in'?'chip-green':'chip-red'}">${a.type==='in'?'SIGN IN':'SIGN OUT'}</span></td>
          <td class="td" style="color:#64748b">${a.siteId || '—'}</td></tr>`;
      }).join('')}</tbody>
    </table></div>`}
  </div>`;
}
function shiftAttDate(dir) {
  const d = new Date(attendanceDate); d.setDate(d.getDate() + dir);
  attendanceDate = fmt.iso(d); renderTab('attendance');
}

// ── Workers ──
let showAddWorker = false, editWorkerId = null, workerForm = { name:'', trade:'', siteIds:[] }, workerMsg = '';
async function renderWorkers(pane) {
  const workers = await DB.get('workers') || [];
  const sites = await DB.get('sites') || [];
  pane.innerHTML = `<div class="fade-up">
    <div class="top-bar">
      <div class="pane-title">Workers (${workers.length})</div>
      <button class="btn-sm" onclick="toggleAddWorker()">+ Add Worker</button>
    </div>
    ${showAddWorker ? `<div class="card">
      <div class="card-title">${editWorkerId ? 'Edit Worker' : 'Add Worker'}</div>
      ${workerMsg ? `<div style="color:#f59e0b;font-size:13px;margin-bottom:8px">${workerMsg}</div>` : ''}
      <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="wName" value="${workerForm.name}" oninput="workerForm.name=this.value"></div>
      <div class="form-group"><label class="form-label">Trade</label>
        <select class="form-input" id="wTrade" onchange="workerForm.trade=this.value">
          <option ${workerForm.trade===''?'selected':''}>General</option>
          <option ${workerForm.trade==='Dryliner'?'selected':''}>Dryliner</option>
          <option ${workerForm.trade==='Labourer'?'selected':''}>Labourer</option>
          <option ${workerForm.trade==='Foreman'?'selected':''}>Foreman</option>
          <option ${workerForm.trade==='Plasterer'?'selected':''}>Plasterer</option>
          <option ${workerForm.trade==='Carpenter'?'selected':''}>Carpenter</option>
          <option ${workerForm.trade==='Electrician'?'selected':''}>Electrician</option>
          <option ${workerForm.trade==='Plumber'?'selected':''}>Plumber</option>
          <option ${workerForm.trade==='Painter'?'selected':''}>Painter</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Assigned Sites</label>
        <div>${sites.map(s => `<span class="site-chip ${workerForm.siteIds.includes(s.id)?'selected':''}" onclick="toggleWorkerSite('${s.id}')">${s.name}</span>`).join('')}</div>
        <div style="font-size:11px;color:#64748b;margin-top:4px">No selection = all sites</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-sm" onclick="saveWorker()">${editWorkerId ? 'Update' : 'Add'}</button>
        <button class="btn-ghost-sm" onclick="cancelAddWorker()">Cancel</button>
      </div>
    </div>` : ''}
    ${workers.length === 0 ? '<div class="card"><div class="empty-state"><div class="empty-icon">👷</div><p>No workers yet. Add your first worker!</p></div></div>' :
    `<div class="table-wrap"><table>
      <thead><tr><th class="th">Name</th><th class="th">Trade</th><th class="th">Status</th><th class="th" style="text-align:right">Actions</th></tr></thead>
      <tbody>${workers.map(w => `<tr>
        <td class="td" style="font-weight:700">${w.name}</td>
        <td class="td" style="color:#94a3b8">${w.trade||'General'}</td>
        <td class="td"><span class="chip ${w.active!==false?'chip-green':'chip-gray'}">${w.active!==false?'Active':'Inactive'}</span></td>
        <td class="td" style="text-align:right"><div style="display:flex;gap:6px;justify-content:flex-end">
          <button class="btn-ghost-sm" onclick="startEditWorker('${w.id}')">✏️</button>
          <button class="btn-ghost-sm" onclick="toggleWorkerActive('${w.id}')">${w.active!==false?'⏸':'▶'}</button>
          <button class="btn-danger-sm" onclick="deleteWorker('${w.id}')">🗑</button>
        </div></td>
      </tr>`).join('')}</tbody>
    </table></div>`}
  </div>`;
}

function toggleAddWorker() { showAddWorker=!showAddWorker; editWorkerId=null; workerForm={name:'',trade:'',siteIds:[]}; renderTab('workers'); }
function cancelAddWorker() { showAddWorker=false; editWorkerId=null; workerMsg=''; renderTab('workers'); }
function toggleWorkerSite(id) { workerForm.siteIds=workerForm.siteIds.includes(id)?workerForm.siteIds.filter(s=>s!==id):[...workerForm.siteIds,id]; renderTab('workers'); }

async function saveWorker() {
  if (!workerForm.name.trim()) { workerMsg='Name is required'; renderTab('workers'); return; }
  const all = await DB.get('workers') || [];
  if (editWorkerId) {
    const idx = all.findIndex(w => w.id === editWorkerId);
    if (idx >= 0) { all[idx].name=workerForm.name.trim(); all[idx].trade=workerForm.trade.trim(); all[idx].siteIds=workerForm.siteIds; }
    workerMsg = 'Worker updated!';
  } else {
    if (all.find(w => w.name.toLowerCase() === workerForm.name.trim().toLowerCase())) { workerMsg='Worker already exists'; renderTab('workers'); return; }
    const sites = await DB.get('sites') || [];
    all.push({ id:genId(), name:workerForm.name.trim(), trade:workerForm.trade.trim(), siteIds:workerForm.siteIds.length>0?workerForm.siteIds:sites.map(s=>s.id), active:true });
    workerMsg = 'Worker added!';
  }
  await DB.set('workers', all);
  showAddWorker=false; editWorkerId=null; workerForm={name:'',trade:'',siteIds:[]};
  setTimeout(()=>{ workerMsg=''; renderTab('workers'); },2000);
  renderTab('workers');
}

async function startEditWorker(id) {
  const w = (await DB.get('workers')||[]).find(x=>x.id===id);
  if(!w) return; workerForm={name:w.name,trade:w.trade||'',siteIds:w.siteIds||[]}; editWorkerId=id; showAddWorker=true; renderTab('workers');
}

async function toggleWorkerActive(id) {
  const all = await DB.get('workers') || [];
  const w = all.find(x=>x.id===id); if(w) w.active=!w.active;
  await DB.set('workers', all); renderTab('workers');
}

async function deleteWorker(id) {
  const all = (await DB.get('workers')||[]).filter(w=>w.id!==id);
  await DB.set('workers', all); renderTab('workers');
}

// ── Sites ──
let showAddSite = false, showQRSiteId = null, siteForm = { name:'', address:'' }, siteMsg = '';
async function renderSites(pane) {
  const sites = await DB.get('sites') || [];
  pane.innerHTML = `<div class="fade-up">
    <div class="top-bar">
      <div class="pane-title">Sites (${sites.length})</div>
      <button class="btn-sm" onclick="toggleAddSite()">+ Add Site</button>
    </div>
    ${showAddSite ? `<div class="card">
      <div class="card-title">Add Site</div>
      ${siteMsg ? `<div style="color:#f59e0b;font-size:13px;margin-bottom:8px">${siteMsg}</div>` : ''}
      <div class="form-group"><label class="form-label">Site Name</label><input class="form-input" id="sName" value="${siteForm.name}" oninput="siteForm.name=this.value"></div>
      <div class="form-group"><label class="form-label">Address (optional)</label><input class="form-input" id="sAddr" value="${siteForm.address}" oninput="siteForm.address=this.value"></div>
      <div style="display:flex;gap:8px">
        <button class="btn-sm" onclick="saveSite()">Add Site</button>
        <button class="btn-ghost-sm" onclick="toggleAddSite()">Cancel</button>
      </div>
    </div>` : ''}
    ${sites.length === 0 ? '<div class="card"><div class="empty-state"><div class="empty-icon">🏗</div><p>No sites yet. Add your first site!</p></div></div>' :
    sites.map(s => `<div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <div style="font-weight:800;font-size:16px">${s.name}</div>
        <div style="display:flex;gap:6px">
          <button class="btn-ghost-sm" onclick="showSiteQR('${s.id}')">📱 QR</button>
          <button class="btn-danger-sm" onclick="deleteSite('${s.id}')">🗑</button>
        </div>
      </div>
      ${s.address ? `<div style="font-size:13px;color:#64748b">${s.address}</div>` : ''}
      <div style="font-size:11px;color:#475569;margin-top:6px;font-family:'JetBrains Mono',monospace">ID: ${s.id}</div>
      ${showQRSiteId === s.id ? `<div class="qr-wrap" style="margin-top:16px;padding-top:16px;border-top:1px solid #1e293b">
        <div class="qr-canvas" id="qr-${s.id}"></div>
        <div class="qr-link">${QR_BASE_URL}?site=${s.id}</div>
        <button class="btn-ghost-sm" onclick="copyQRLink('${s.id}')">📋 Copy Link</button>
      </div>` : ''}
    </div>`).join('')}
  </div>`;

  // Render QR if open
  if (showQRSiteId) {
    const el = document.getElementById('qr-' + showQRSiteId);
    if (el && el.children.length === 0) {
      new QRCode(el, { text: `${QR_BASE_URL}?site=${showQRSiteId}`, width: 200, height: 200, colorDark: '#0a0f1a', colorLight: '#ffffff' });
    }
  }
}

function toggleAddSite() { showAddSite=!showAddSite; siteForm={name:'',address:''}; siteMsg=''; renderTab('sites'); }

async function saveSite() {
  if (!siteForm.name.trim()) { siteMsg='Site name is required'; renderTab('sites'); return; }
  const sites = await DB.get('sites') || [];
  sites.push({ id: genId(), name: siteForm.name.trim(), address: siteForm.address.trim() });
  await DB.set('sites', sites);
  if (!currentSiteId) currentSiteId = sites[0].id;
  showAddSite = false; siteForm = { name:'', address:'' };
  renderSiteSelect(); renderTab('sites');
  toast('Site added!');
}

async function deleteSite(id) {
  const sites = (await DB.get('sites')||[]).filter(s=>s.id!==id);
  await DB.set('sites', sites);
  if (currentSiteId===id) currentSiteId = sites.length > 0 ? sites[0].id : null;
  renderSiteSelect(); renderTab('sites');
}

function showSiteQR(id) { showQRSiteId = showQRSiteId===id ? null : id; renderTab('sites'); }

function copyQRLink(siteId) {
  navigator.clipboard.writeText(`${QR_BASE_URL}?site=${siteId}`).then(() => toast('Link copied!'));
}

// ── Reports ──
let reportRange = 'week';
async function renderReports(pane) {
  const workers = await DB.get('workers') || [];
  const attendance = await DB.get('attendance') || [];
  const today = new Date();
  let startDate;
  if (reportRange === 'week') { startDate = new Date(today); startDate.setDate(today.getDate() - today.getDay() + 1); }
  else if (reportRange === 'month') { startDate = new Date(today.getFullYear(), today.getMonth(), 1); }
  else { startDate = new Date(today); startDate.setDate(today.getDate() - 6); }

  const startIso = fmt.iso(startDate);
  const filtered = attendance.filter(a => a.date >= startIso && (!currentSiteId || a.siteId === currentSiteId));

  // Calculate hours per worker
  const workerHours = {};
  workers.forEach(w => { workerHours[w.id] = { name: w.name, trade: w.trade||'General', total: 0, days: 0, daysSet: new Set() }; });
  filtered.forEach(a => {
    if (a.type === 'out') {
      const inRec = [...filtered].reverse().find(r => r.workerId === a.workerId && r.type === 'in' && r.date === a.date && new Date(r.time) < new Date(a.time));
      if (inRec && workerHours[a.workerId]) {
        workerHours[a.workerId].total += new Date(a.time) - new Date(inRec.time);
        workerHours[a.workerId].daysSet.add(a.date);
      }
    }
  });
  Object.values(workerHours).forEach(wh => { wh.days = wh.daysSet.size; });

  const sorted = Object.entries(workerHours).sort((a,b) => b[1].total - a[1].total);

  pane.innerHTML = `<div class="fade-up">
    <div class="top-bar">
      <div class="pane-title">Reports</div>
      <div style="display:flex;gap:6px">
        <button class="btn-ghost-sm ${reportRange==='week'?'btn-sm':''}" onclick="reportRange='week';renderTab('reports')">Week</button>
        <button class="btn-ghost-sm ${reportRange==='month'?'btn-sm':''}" onclick="reportRange='month';renderTab('reports')">Month</button>
      </div>
    </div>
    ${sorted.length === 0 ? '<div class="card"><div class="empty-state"><div class="empty-icon">📈</div><p>No data for this period</p></div></div>' :
    `<div class="table-wrap"><table>
      <thead><tr><th class="th">Worker</th><th class="th">Trade</th><th class="th">Days</th><th class="th">Total Hours</th></tr></thead>
      <tbody>${sorted.map(([id, wh]) => `<tr>
        <td class="td" style="font-weight:700">${wh.name}</td>
        <td class="td" style="color:#94a3b8">${wh.trade}</td>
        <td class="td">${wh.days}</td>
        <td class="td" style="font-family:'JetBrains Mono',monospace;color:#f59e0b">${fmt.hours(wh.total)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`}
  </div>`;
}

function doLogout() {
  currentManager = null; currentTab = 'dashboard';
  // Unlisten all
  DB.unlisten('sites'); DB.unlisten('workers'); DB.unlisten('attendance');
  showScreen('login'); pin = ''; updatePinDots();
}
</script>
</body>
</html>
